config:
  timezone: Europe/Berlin
  extraEnv:
    - name: NODE_OPTIONS
      value: --max-old-space-size=768
    - name: GENERIC_TIMEZONE
      value: Europe/Berlin
    - name: OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS
      value: "true"
    - name: N8N_LOG_LEVEL
      value: info
    - name: N8N_PROXY_HOPS
      value: "1"
    - name: DB_PING_INTERVAL_SECONDS
      value: "30"
    - name: DB_POSTGRESDB_SSL_ENABLED
      value: "true"
    - name: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
      value: "true"
    - name: QUEUE_BULL_REDIS_TLS
      value: "true"
    - name: N8N_MULTI_MAIN_SETUP_ENABLED
      value: "true"
    - name: N8N_TEMPLATES_ENABLED
      value: "true"
    - name: N8N_SKIP_AUTH_ON_OAUTH_CALLBACK
      value: "false"
    - name: N8N_RESTRICT_FILE_ACCESS_TO
      value: ~/.n8n-files
    - name: N8N_DIAGNOSTICS_ENABLED
      value: "false"
    - name: N8N_PERSONALIZATION_ENABLED
      value: "false"
    - name: N8N_HIRING_BANNER_ENABLED
      value: "false"
    - name: N8N_DIAGNOSTICS_CONFIG_FRONTEND
      value: "false"
    - name: N8N_VERSION_NOTIFICATIONS_ENABLED
      value: "false"
    - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
      value: "true"
    - name: N8N_BLOCK_ENV_ACCESS_IN_NODE
      value: "true"
    - name: N8N_GIT_NODE_DISABLE_BARE_REPOS
      value: "true"
    - name: N8N_COMMUNITY_PACKAGES_ENABLED
      value: "false"
    - name: N8N_USER_MANAGEMENT_JWT_DURATION_HOURS
      value: "1"
    - name: N8N_RUNNERS_ENABLED
      value: "true"
    - name: N8N_RUNNERS_STDLIB_ALLOW
      value: datetime,json,csv,re,os,math,base64,io
    - name: N8N_RUNNERS_EXTERNAL_ALLOW
      value: pandas,numpy,requests,openpyxl,xlrd,python-dateutil,pytz,pyyaml,lxml,beautifulsoup4,pypdf,pdfplumber,boto3,urllib3,pptx
    - name: NODES_EXCLUDE
      value: '[]'