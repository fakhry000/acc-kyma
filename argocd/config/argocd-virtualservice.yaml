apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: argocd
  namespace: argocd
spec:
  hosts:
    - argocd.<YOUR_KYMA_DOMAIN>
  gateways:
    - kyma-system/kyma-gateway
  http:
    - route:
        - destination:
            host: argocd-server
            port:
              number: 80
