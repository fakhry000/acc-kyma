webhook:
  enabled: true
  url: https://hr.<YOUR_KYMA_DOMAIN>

database:
  user: n8n_hr_user
  schema: n8n-hr

redis:
  prefix: n8n-hr

taskRunners:
  enabled: true
  image:
    repository: ghcr.io/fakhry000/n8n-hr-task-runner
    tag: "2.15.0"
    pullPolicy: IfNotPresent
  authToken:
    existingSecret: n8n-task-runner-secret
    existingSecretKey: N8N_RUNNERS_AUTH_TOKEN
  nativePythonRunner: true
  broker:
    listenAddress: 0.0.0.0
    port: 5679
  launcher:
    logLevel: info
    autoShutdownTimeout: 60
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

config:
  extraEnv:
    - name: NODE_OPTIONS
      value: --max-old-space-size=768
    - name: GENERIC_TIMEZONE
      value: Europe/Berlin
    - name: OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS
      value: "true"
    - name: N8N_LOG_LEVEL
      value: info
    - name: N8N_PROXY_HOPS
      value: "1"
    - name: EXECUTIONS_TIMEOUT_MAX
      value: "604800"
    - name: EXECUTIONS_TIMEOUT
      value: "3600"
    - name: EXECUTIONS_DATA_MAX_AGE
      value: "168"
    - name: DB_POSTGRESDB_POOL_SIZE
      value: "4"
    - name: DB_PING_INTERVAL_SECONDS
      value: "30"
    - name: N8N_TEMPLATES_ENABLED
      value: "true"
    - name: N8N_SKIP_AUTH_ON_OAUTH_CALLBACK
      value: "false"
    - name: N8N_RESTRICT_FILE_ACCESS_TO
      value: ~/.n8n-files
    - name: N8N_DIAGNOSTICS_ENABLED
      value: "false"
    - name: N8N_PERSONALIZATION_ENABLED
      value: "false"
    - name: N8N_HIRING_BANNER_ENABLED
      value: "false"
    - name: N8N_DIAGNOSTICS_CONFIG_FRONTEND
      value: "false"
    - name: N8N_VERSION_NOTIFICATIONS_ENABLED
      value: "false"
    - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
      value: "true"
    - name: N8N_BLOCK_ENV_ACCESS_IN_NODE
      value: "true"
    - name: N8N_GIT_NODE_DISABLE_BARE_REPOS
      value: "true"
    - name: N8N_COMMUNITY_PACKAGES_ENABLED
      value: "false"
    - name: N8N_USER_MANAGEMENT_JWT_DURATION_HOURS
      value: "1"
    - name: N8N_EMAIL_MODE
      value: smtp
    - name: N8N_SMTP_HOST
      value: <SMTP_HOST>
    - name: N8N_SMTP_PORT
      value: "587"
    - name: N8N_SMTP_USER
      valueFrom:
        secretKeyRef:
          name: n8n-app-secrets
          key: N8N_SMTP_USER
    - name: N8N_SMTP_PASS
      valueFrom:
        secretKeyRef:
          name: n8n-app-secrets
          key: N8N_SMTP_PASS
    - name: N8N_SMTP_SENDER
      value: <SMTP_SENDER_EMAIL>
    - name: N8N_SMTP_STARTTLS
      value: "true"
    - name: N8N_SMTP_SSL
      value: "false"
    - name: N8N_TEMPLATES_HOST
      value: <N8N_TEMPLATES_HOST>
    - name: N8N_EDITOR_BASE_URL
      value: https://hr.<YOUR_KYMA_DOMAIN>
    - name: WEBHOOK_URL
      value: https://hr.<YOUR_KYMA_DOMAIN>
    - name: N8N_REDIS_KEY_PREFIX
      value: n8n-hr
    - name: N8N_RUNNERS_ENABLED
      value: "true"
    - name: N8N_RUNNERS_STDLIB_ALLOW
      value: datetime,json,csv,re,os,math,base64,io
    - name: N8N_RUNNERS_EXTERNAL_ALLOW
      value: pandas,numpy,requests,openpyxl,xlrd,python-dateutil,pytz,pyyaml,lxml,beautifulsoup4,pypdf,pdfplumber,boto3,urllib3,pptx
    - name: NODES_EXCLUDE
      value: '[]'
